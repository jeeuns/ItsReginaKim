name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main   # change this if your default branch is named differently (e.g. "master")
  workflow_dispatch:  # lets you manually trigger a deploy from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

# Only allow one deployment at a time, skip queued runs, but don't cancel one in progress
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Add CNAME for custom domain
        run: echo "itsreginakim.com" > ./dist/CNAME

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
